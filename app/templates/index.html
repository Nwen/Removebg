<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="max-upload-mb" content="{{ max_upload_mb }}">
  <meta name="allowed-types" content="{{ allowed_types }}">
  <title>Remove Background</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <span>removebg</span>
    </div>
    <p class="tagline">Self-hosted &middot; Privacy-first &middot; No data leaves your server</p>
  </div>
</header>

<main class="main" id="app" data-state="initial">

  <!-- ── Upload zone ─────────────────────────────────────────────── -->
  <section class="upload-section" id="upload-section">
    <div class="drop-zone" id="drop-zone" role="button" tabindex="0"
         aria-label="Drop an image here or click to select">
      <input type="file" id="file-input"
             accept="image/png,image/jpeg,image/webp,.jpg,.jpeg,.png,.webp"
             aria-hidden="true">

      <div class="drop-icon" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="16 16 12 12 8 16"/>
          <line x1="12" y1="12" x2="12" y2="21"/>
          <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
      </div>
      <p class="drop-primary">Drag &amp; drop an image here</p>
      <p class="drop-secondary">
        or <span class="link-text">click to select a file</span>
      </p>
      <p class="drop-hint">PNG, JPEG, WebP &middot; Max {{ max_upload_mb }}&nbsp;MB</p>
    </div>
  </section>

  <!-- ── Error banner ────────────────────────────────────────────── -->
  <div class="error-banner" id="error-banner" role="alert" aria-live="assertive"></div>

  <!-- ── Viewer: before / after panels ──────────────────────────── -->
  <section class="viewer" id="viewer">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Original</span>
        <button class="link-btn" id="change-btn" type="button">Change image</button>
      </div>
      <div class="panel-body">
        <img id="original-img" class="panel-img" alt="Original image">
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Result</span>
      </div>
      <div class="panel-body result-body" id="result-body">

        <!-- placeholder text before any processing -->
        <div class="result-placeholder" id="result-placeholder">
          <p>Press <strong>Remove Background</strong> to process</p>
        </div>

        <!-- spinner during processing -->
        <div class="spinner-wrap" id="spinner-wrap">
          <div class="spinner" aria-hidden="true"></div>
          <p class="spinner-label">Removing background&hellip;</p>
          <p class="spinner-note">CPU inference may take several seconds</p>
        </div>

        <!-- result image on checkerboard -->
        <div class="checkerboard" id="result-checkerboard">
          <img id="result-img" class="panel-img" alt="Background removed">
        </div>

      </div>
    </div>
  </section>

  <!-- ── Action bar ──────────────────────────────────────────────── -->
  <div class="action-bar" id="action-bar">
    <!-- shown in "selected" state -->
    <button class="btn-primary" id="remove-btn" type="button">Remove Background</button>
    <!-- shown in "done" state -->
    <button class="btn-primary" id="download-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="8 17 12 21 16 17"/>
        <line x1="12" y1="12" x2="12" y2="21"/>
        <path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.36"/>
      </svg>
      Download PNG
    </button>
    <button class="btn-secondary" id="try-another-btn" type="button">Try another image</button>
  </div>

</main>

<script src="/static/app.js"></script>
</body>
</html>
